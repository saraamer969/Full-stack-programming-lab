<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotSpring - Edit Billing Address</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div style="background: linear-gradient(180deg, #c8d8e8 0%, #e8ecef 30%);">
<div class="container">
  <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="account.html">My Account</a> <span>›</span> Edit Billing Address</div>
  <div class="content-wrap">
    <h1 style="font-size:20px;font-weight:bold;margin-bottom:16px">Edit Billing Address</h1>
    <div class="form-section" style="max-width:520px">
      <h3>Billing Address Details</h3>
      <div class="required-note">*Required Fields</div>
      <div class="form-row">
        <label>First Name <span class="req">*</span></label>
        <input type="text" value="Farrukh">
      </div>
      <div class="form-row">
        <label>Last Name <span class="req">*</span></label>
        <input type="text" value="Javaid">
      </div>
      <div class="form-row">
        <label>Company</label>
        <input type="text" value="Hottub Spas">
      </div>
      <div class="form-row">
        <label>Address <span class="req">*</span></label>
        <input type="text" value="Plot 10 Tech Society">
      </div>
      <div class="form-row">
        <label>City <span class="req">*</span></label>
        <input type="text" value="California">
      </div>
      <div class="form-row">
        <label>State / Province</label>
        <input type="text" value="CA">
      </div>
      <div class="form-row">
        <label>Zip / Postal Code</label>
        <input type="text" value="20112">
      </div>
      <div class="form-row">
        <label>Country <span class="req">*</span></label>
        <select style="flex:1;max-width:280px;padding:5px 8px;border:1px solid #ccc;font-size:12px"><option>United States</option></select>
      </div>
      <div class="form-row">
        <label>Phone</label>
        <input type="tel">
      </div>
      <div style="margin-top:14px;display:flex;gap:10px">
        <button class="btn-red" onclick="location.href='account.html'">SAVE ADDRESS</button>
        <button class="btn-gray" onclick="location.href='account.html'">CANCEL</button>
      </div>
    </div>
  </div>
</div></div>
<div id="site-footer"></div>
<script src="js/layout.js"></script>
</body>
</html>
