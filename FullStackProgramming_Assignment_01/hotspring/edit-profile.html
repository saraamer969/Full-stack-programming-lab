<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotSpring - Edit Account</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div style="background: linear-gradient(180deg, #c8d8e8 0%, #e8ecef 30%);">
<div class="container">
  <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="account.html">My Account</a> <span>›</span> Edit Account</div>
  <div class="content-wrap">
    <h1 style="font-size:20px;font-weight:bold;margin-bottom:16px">Edit Account Details</h1>
    <div class="form-section" style="max-width:520px">
      <h3>Account Information</h3>
      <div class="required-note">*Required Fields</div>
      <div class="form-row">
        <label>First Name <span class="req">*</span></label>
        <input type="text" value="Farrukh">
      </div>
      <div class="form-row">
        <label>Last Name <span class="req">*</span></label>
        <input type="text" value="Javaid">
      </div>
      <div class="form-row">
        <label>Email Address <span class="req">*</span></label>
        <input type="email" value="user@example.com">
      </div>
      <div class="form-row">
        <label>Telephone</label>
        <input type="tel">
      </div>
      <hr class="divider">
      <h3 style="margin-bottom:10px">Change Password</h3>
      <div class="form-row">
        <label>Current Password</label>
        <input type="password">
      </div>
      <div class="form-row">
        <label>New Password</label>
        <input type="password">
      </div>
      <div class="form-row">
        <label>Confirm Password</label>
        <input type="password">
      </div>
      <div style="margin-top:14px;display:flex;gap:10px">
        <button class="btn-red" onclick="location.href='account.html'">SAVE CHANGES</button>
        <button class="btn-gray" onclick="location.href='account.html'">CANCEL</button>
      </div>
    </div>
  </div>
</div></div>
<div id="site-footer"></div>
<script src="js/layout.js"></script>
</body>
</html>
