<!DOCTYPE html>
<html>
<head>
    <title>Online Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .cart-container {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .cart-item {
            background: #f8f9fc;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
        }

        .highlight {
            color: #4e73df;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div class="cart-container">
        <h2>🛒 Online Shopping Cart</h2>
        <div id="cartOutput"></div>
    </div>

    <script>
        let cart = [];

        function addToCart(...items) {
            cart.push(...items);
        }

        addToCart("Laptop", "Mouse", "Keyboard", "Headphones");

        const clonedCart = [...cart];

        const [firstItem, ...remainingItems] = clonedCart;

        const outputDiv = document.getElementById("cartOutput");

        outputDiv.innerHTML = `
            <div class="cart-item">
                Total Items: <span class="highlight">${cart.length}</span>
            </div>

            <div class="cart-item">
                First Item: <span class="highlight">${firstItem}</span>
            </div>

            <div class="cart-item">
                Remaining Items: ${remainingItems.join(", ")}
            </div>

            <div class="cart-item">
                Updated Cart: ${clonedCart.join(", ")}
            </div>
        `;
    </script>

</body>
</html>
